<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - E-commerce</title>
  </head>
  <body>
    <h1>Admin Dashboard</h1>
    <h2>Products</h2>
    <ul>
      {% for product in products %}
      <li>{{ product.name }} - ${{ product.price }}</li>
      {% endfor %}
    </ul>
    <a href="{{ url_for('logout') }}">Logout</a>
  </body>
</html>
